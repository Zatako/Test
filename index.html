html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
}

body {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  min-height: -webkit-fill-available;
}

.bg {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background-image: url('bg.jpg.JPG');
  background-size: cover;
  background-position: center;
  filter: brightness(0.7);
}

.play-btn {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 10;
  width: 90px;
  height: 90px;
  border-radius: 50%;
  border: 3px solid rgba(255,255,255,0.85);
  background: rgba(0,0,0,0.35);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.15s ease;
  -webkit-tap-highlight-color: transparent;
}
.play-btn:active {
  transform: translate(-50%, -50%) scale(0.92);
}
.play-btn svg {
  width: 36px;
  height: 36px;
  fill: white;
  margin-left: 5px;
}

.video-wrap {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  z-index: 20;
  background: #000;
  align-items: center;
  justify-content: center;
}
.video-wrap.show { display: flex; }

#vid {
  width: 100vw;
  height: 100vh;
  object-fit: contain;
}

#bgVid {
  position: fixed;
  width: 1px;
  height: 1px;
  opacity: 0;
  pointer-events: none;
}

/* WebRTC 觸發用，完全隱藏 */
#rtcAudio {
  position: fixed;
  width: 0;
  height: 0;
  opacity: 0;
  pointer-events: none;
}

.close-btn {
  position: absolute;
  top: max(16px, env(safe-area-inset-top));
  right: 18px;
  background: rgba(255,255,255,0.2);
  border: none;
  border-radius: 50%;
  width: 42px;
  height: 42px;
  font-size: 1.2rem;
  color: #fff;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1;
  -webkit-tap-highlight-color: transparent;
}

<body>

  <div class="bg"></div>

  <button class="play-btn" id="playBtn" aria-label="播放">
    <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
  </button>

  <div class="video-wrap" id="videoWrap">
    <button class="close-btn" id="closeBtn">✕</button>
    <video id="vid" playsinline controls>
      <source src="https://github.com/Zatako/Test/releases/download/Vi/video.mp4" type="video/mp4">
    </video>
  </div>

  <!-- 背景音樂，獨立播放不經過 AudioContext -->

  <video id="bgVid" playsinline loop>
    <source src="audio.mp3.mp3" type="audio/mpeg">
  </video>

  <!-- 只用來觸發通話模式，本身靜音 -->

<audio id="rtcAudio" autoplay muted></audio>

  <script>
    const playBtn   = document.getElementById('playBtn');
    const videoWrap = document.getElementById('videoWrap');
    const closeBtn  = document.getElementById('closeBtn');
    const vid       = document.getElementById('vid');
    const bgVid     = document.getElementById('bgVid');
    const rtcAudio  = document.getElementById('rtcAudio');

    let rtcActive = false;
    let vidStarted = false;

    // 只用 WebRTC 觸發通話模式，不混音
    async function activateCallMode() {
      if (rtcActive) return;
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          audio: {
            echoCancellation: false,
            noiseSuppression: false,
            autoGainControl: false
          }
        });

        // 建立靜音的 AudioContext，只為觸發通話路由
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const src = ctx.createMediaStreamSource(stream);
        const dest = ctx.createMediaStreamDestination();
        const gain = ctx.createGain();
        gain.gain.value = 0; // 完全靜音，只觸發路由
        src.connect(gain);
        gain.connect(dest);

        rtcAudio.srcObject = dest.stream;
        rtcAudio.muted = false;
        await rtcAudio.play();

        rtcActive = true;
      } catch (e) {
        console.log('WebRTC not available:', e);
      }
    }

    function startBgMusic() {
      bgVid.currentTime = 0;
      const p = bgVid.play();
      if (p !== undefined) p.catch(() => {});
    }

    // 影片暫停（且未結束）→ 播背景音
    vid.addEventListener('pause', () => {
      if (vidStarted && !vid.ended) {
        startBgMusic();
      }
    });

    // 影片開始播 → 停背景音
    vid.addEventListener('play', () => {
      vidStarted = true;
      bgVid.pause();
    });

    // 影片結束 → 關閉視窗，播背景音
    vid.addEventListener('ended', () => {
      videoWrap.classList.remove('show');
      startBgMusic();
    });

    playBtn.addEventListener('click', async () => {
      await activateCallMode();
      videoWrap.classList.add('show');
      vid.play().catch(e => console.log('Play failed:', e));
    });

    closeBtn.addEventListener('click', () => {
      vid.pause(); // 觸發 pause 事件，自動播背景音
      vid.currentTime = 0;
      videoWrap.classList.remove('show');
    });
  </script>

</body>
</html>
