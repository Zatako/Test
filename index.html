html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
}

body {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  min-height: -webkit-fill-available;
}

.bg {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background-image: url('bg.jpg.JPG');
  background-size: cover;
  background-position: center;
  filter: brightness(0.7);
}

.play-btn {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 10;
  width: 90px;
  height: 90px;
  border-radius: 50%;
  border: 3px solid rgba(255,255,255,0.85);
  background: rgba(0,0,0,0.35);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.15s ease;
  -webkit-tap-highlight-color: transparent;
}
.play-btn:active {
  transform: translate(-50%, -50%) scale(0.92);
}
.play-btn svg {
  width: 36px;
  height: 36px;
  fill: white;
  margin-left: 5px;
}

.video-wrap {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  z-index: 20;
  background: #000;
  align-items: center;
  justify-content: center;
}
.video-wrap.show { display: flex; }

/* 主影片 */
#vid {
  width: 100vw;
  height: 100vh;
  object-fit: contain;
}

/* 背景音樂用的隱藏影片 */
#bgVid {
  position: fixed;
  width: 1px;
  height: 1px;
  opacity: 0;
  pointer-events: none;
}

.close-btn {
  position: absolute;
  top: max(16px, env(safe-area-inset-top));
  right: 18px;
  background: rgba(255,255,255,0.2);
  border: none;
  border-radius: 50%;
  width: 42px;
  height: 42px;
  font-size: 1.2rem;
  color: #fff;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1;
  -webkit-tap-highlight-color: transparent;
}

<body>

  <div class="bg"></div>

  <button class="play-btn" id="playBtn" aria-label="播放">
    <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
  </button>

  <div class="video-wrap" id="videoWrap">
    <button class="close-btn" id="closeBtn">✕</button>
    <video id="vid" playsinline controls>
      <source src="https://github.com/Zatako/Test/releases/download/Vi/video.mp4.mov" type="video/mp4">
      <source src="https://github.com/Zatako/Test/releases/download/Vi/video.mp4.mov" type="video/quicktime">
    </video>
  </div>

  <!-- 背景音樂用 video 播放，繞過 iOS 靜音鍵 -->

  <video id="bgVid" playsinline loop>
    <source src="audio.mp3.mp3" type="audio/mpeg">
  </video>

  <script>
    const playBtn   = document.getElementById('playBtn');
    const videoWrap = document.getElementById('videoWrap');
    const closeBtn  = document.getElementById('closeBtn');
    const vid       = document.getElementById('vid');
    const bgVid     = document.getElementById('bgVid');

    function startBgMusic() {
      bgVid.currentTime = 0;
      bgVid.play().catch(() => {});
    }

    // 主影片播完 → 關閉，播背景音樂
    vid.addEventListener('ended', () => {
      videoWrap.classList.remove('show');
      startBgMusic();
    });

    playBtn.addEventListener('click', () => {
      // iOS 需要在 user gesture 裡先 load
      bgVid.load();
      videoWrap.classList.add('show');
      vid.play().catch(() => {});
    });

    closeBtn.addEventListener('click', () => {
      vid.pause();
      vid.currentTime = 0;
      videoWrap.classList.remove('show');
      startBgMusic();
    });
  </script>

</body>
</html>
